# Nixoraa — Automated Cloud Deployment
# Google Cloud Build + Cloud Run Infrastructure-as-Code

steps:
  # Step 1 — Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/nixoraa-backend:$COMMIT_SHA'
      - '.'

  # Step 2 — Push image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/nixoraa-backend:$COMMIT_SHA'

  # Step 3 — Deploy to Cloud Run automatically
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'nixoraa-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/nixoraa-backend:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'PROJECT_ID=$PROJECT_ID'

# Store built image
images:
  - 'gcr.io/$PROJECT_ID/nixoraa-backend:$COMMIT_SHA'

# Deployment timeout
timeout: '1200s'
```

